<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniLife - Baby Simulator</title>
    <meta name="description" content="A beautiful baby simulator game where you manage the life of a virtual baby.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
</head>
<body>
    <main id="game-container">
        <div id="sleep-overlay" class="hidden"></div>
        <div id="phaser-container"></div>
        <!-- Removed duplicate status-message -->
        
        <div id="growth-info" class="growth-info">LEVEL 1 • SÄUGLING</div>
        
        <div class="xp-container">
            <div class="stat-label">
                <span>Wachstum</span>
                <span id="xp-value">0 / 150</span>
            </div>
            <div class="progress-bar xp-bar">
                <div id="xp-fill" class="progress-fill xp-fill"></div>
            </div>
        </div>

        <div id="baby-container">
            <!-- CSS/SVG baby character - fully procedurally animated -->
            <svg id="baby-svg" viewBox="0 -40 200 260" xmlns="http://www.w3.org/2000/svg" width="200" height="260">
                <defs>
                    <radialGradient id="skinGrad" cx="50%" cy="40%" r="60%">
                        <stop offset="0%" stop-color="#fde8d0"/>
                        <stop offset="100%" stop-color="#f5c5a3"/>
                    </radialGradient>
                    <radialGradient id="cheekGrad" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#ffb3b3" stop-opacity="0.7"/>
                        <stop offset="100%" stop-color="#ffb3b3" stop-opacity="0"/>
                    </radialGradient>
                    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#00000033"/>
                    </filter>
                </defs>

                <!-- Body group - for breathing/body sway -->
                <g id="baby-body-group" transform="translate(100,130)">
                    <!-- Body -->
                    <ellipse id="baby-body" cx="0" cy="0" rx="40" ry="48" fill="url(#skinGrad)" filter="url(#softShadow)"/>
                    <!-- Onesie -->
                    <ellipse cx="0" cy="8" rx="37" ry="42" fill="#a5f3fc" opacity="0.85"/>
                    <!-- Onesie buttons -->
                    <circle cx="0" cy="-8" r="3" fill="white" opacity="0.6"/>
                    <circle cx="0" cy="2" r="3" fill="white" opacity="0.6"/>
                    <circle cx="0" cy="12" r="3" fill="white" opacity="0.6"/>

                    <!-- Left arm group -->
                    <g id="baby-arm-left" transform="translate(-38,-10)">
                        <ellipse cx="0" cy="0" rx="10" ry="18" fill="url(#skinGrad)" transform="rotate(-20)"/>
                        <!-- Hand -->
                        <ellipse cx="-6" cy="16" rx="8" ry="7" fill="url(#skinGrad)" transform="rotate(-20) translate(0,8)"/>
                    </g>

                    <!-- Right arm group -->
                    <g id="baby-arm-right" transform="translate(38,-10)">
                        <ellipse cx="0" cy="0" rx="10" ry="18" fill="url(#skinGrad)" transform="rotate(20)"/>
                        <!-- Hand -->
                        <ellipse cx="6" cy="16" rx="8" ry="7" fill="url(#skinGrad)" transform="rotate(20) translate(0,8)"/>
                    </g>

                    <!-- Left leg -->
                    <g id="baby-leg-left" transform="translate(-18,42)">
                        <ellipse cx="0" cy="0" rx="12" ry="16" fill="#a5f3fc"/>
                        <ellipse cx="0" cy="14" rx="10" ry="8" fill="url(#skinGrad)"/>
                    </g>
                    <!-- Right leg -->
                    <g id="baby-leg-right" transform="translate(18,42)">
                        <ellipse cx="0" cy="0" rx="12" ry="16" fill="#a5f3fc"/>
                        <ellipse cx="0" cy="14" rx="10" ry="8" fill="url(#skinGrad)"/>
                    </g>
                </g>

                <!-- Head group - separate for head bobbing/looking around -->
                <g id="baby-head-group" transform="translate(100,75)">
                    <!-- Head -->
                    <ellipse id="baby-head" cx="0" cy="0" rx="44" ry="42" fill="url(#skinGrad)" filter="url(#softShadow)"/>

                    <!-- Cheeks -->
                    <ellipse cx="-28" cy="10" rx="14" ry="10" fill="url(#cheekGrad)"/>
                    <ellipse cx="28" cy="10" rx="14" ry="10" fill="url(#cheekGrad)"/>

                    <!-- Ears -->
                    <ellipse cx="-43" cy="5" rx="7" ry="9" fill="#f5c5a3"/>
                    <ellipse cx="43" cy="5" rx="7" ry="9" fill="#f5c5a3"/>

                    <!-- Left eye group -->
                    <g id="baby-eye-left" transform="translate(-16,-5)">
                        <!-- Eye white -->
                        <ellipse cx="0" cy="0" rx="10" ry="10" fill="white"/>
                        <!-- Iris -->
                        <ellipse id="iris-left" cx="0" cy="0" rx="7" ry="7" fill="#4f46e5"/>
                        <!-- Pupil -->
                        <ellipse cx="0" cy="0" rx="4" ry="4" fill="#1e1b4b"/>
                        <!-- Highlight -->
                        <ellipse cx="2" cy="-2" rx="2" ry="2" fill="white" opacity="0.8"/>
                        <!-- Eyelid (for blinking) -->
                        <ellipse id="eyelid-left" cx="0" cy="-10" rx="10" ry="10" fill="url(#skinGrad)"/>
                    </g>

                    <!-- Right eye group -->
                    <g id="baby-eye-right" transform="translate(16,-5)">
                        <ellipse cx="0" cy="0" rx="10" ry="10" fill="white"/>
                        <ellipse id="iris-right" cx="0" cy="0" rx="7" ry="7" fill="#4f46e5"/>
                        <ellipse cx="0" cy="0" rx="4" ry="4" fill="#1e1b4b"/>
                        <ellipse cx="2" cy="-2" rx="2" ry="2" fill="white" opacity="0.8"/>
                        <ellipse id="eyelid-right" cx="0" cy="-10" rx="10" ry="10" fill="url(#skinGrad)"/>
                    </g>

                    <!-- Nose -->
                    <ellipse cx="0" cy="8" rx="5" ry="4" fill="#e8a88a" opacity="0.6"/>

                    <!-- Mouth -->
                    <g id="baby-mouth">
                        <!-- Happy mouth (default) -->
                        <path id="mouth-happy" d="M -10 18 Q 0 28 10 18" stroke="#d08060" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                        <!-- Sad mouth (hidden) -->
                        <path id="mouth-sad" d="M -10 24 Q 0 16 10 24" stroke="#d08060" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0"/>
                        <!-- Open mouth (feeding) -->
                        <ellipse id="mouth-open" cx="0" cy="22" rx="8" ry="6" fill="#c97060" opacity="0"/>
                        <!-- Laughing mouth (hidden) -->
                        <path id="mouth-laugh" d="M -12 18 Q 0 32 12 18 Z" fill="#d08060" opacity="0"/>
                    </g>

                    <!-- Hair -->
                    <ellipse cx="0" cy="-38" rx="20" ry="10" fill="#8B4513" opacity="0.8"/>
                    <ellipse cx="-15" cy="-42" rx="12" ry="8" fill="#8B4513" opacity="0.8"/>
                    <ellipse cx="15" cy="-42" rx="12" ry="8" fill="#8B4513" opacity="0.8"/>

                    <!-- Tears (hidden by default) -->
                    <ellipse id="tear-left" cx="-24" cy="18" rx="4" ry="6" fill="#60a5fa" opacity="0"/>
                    <ellipse id="tear-right" cx="24" cy="18" rx="4" ry="6" fill="#60a5fa" opacity="0"/>

                    <!-- Zzz for sleep (hidden) -->
                    <text id="sleep-z1" x="50" y="-30" font-size="20" fill="#60a5fa" font-weight="bold" opacity="0">z</text>
                    <text id="sleep-z2" x="62" y="-45" font-size="14" fill="#60a5fa" font-weight="bold" opacity="0">z</text>
                    <text id="sleep-z3" x="70" y="-56" font-size="10" fill="#60a5fa" font-weight="bold" opacity="0">z</text>
                </g>
            </svg>
        </div>

        <div class="stats-container">
            <div class="stat-item">
                <div class="stat-label">
                    <span>Hunger</span>
                    <span id="hunger-value">100%</span>
                </div>
                <div class="progress-bar">
                    <div id="hunger-bar" class="progress-fill hunger-fill"></div>
                </div>
            </div>

            <div class="stat-item">
                <div class="stat-label">
                    <span>Sleep</span>
                    <span id="sleep-value">100%</span>
                </div>
                <div class="progress-bar">
                    <div id="sleep-bar" class="progress-fill sleep-fill"></div>
                </div>
            </div>

            <div class="stat-item">
                <div class="stat-label">
                    <span>Happiness</span>
                    <span id="happiness-value">100%</span>
                </div>
                <div class="progress-bar">
                    <div id="happiness-bar" class="progress-fill happiness-fill"></div>
                </div>
            </div>

            <div class="stat-item">
                <div class="stat-label">
                    <span>Hygiene</span>
                    <span id="hygiene-value">100%</span>
                </div>
                <div class="progress-bar">
                    <div id="hygiene-bar" class="progress-fill hygiene-fill"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="btn-feed" title="Feed the baby">🍼 Feed</button>
            <button id="btn-sleep" title="Put baby to sleep">💤 Sleep</button>
            <button id="btn-play" title="Play with baby">🧸 Play</button>
            <button id="btn-clean" title="Clean the baby">🛁 Clean</button>
            <button id="btn-game" class="btn-special" title="Start Minigame">🎮 Minispiel</button>
        </div>

        <div id="minigame-overlay" class="hidden">
            <div id="minigame-container"></div>
            <div class="minigame-ui">
                <div id="minigame-score">Punkte: 0</div>
                <div id="minigame-timer">Zeit: 30</div>
                <button id="btn-close-game">Beenden</button>
            </div>
        </div>

        <div id="status-message" class="status-message">Baby is happy and healthy!</div>

        <div class="inventory-section">
            <h3>Toy Box</h3>
            <div class="inventory-grid">
                <div class="inventory-item" id="item-duck" title="Rubber Duck (+Hygiene)">🦆</div>
                <div class="inventory-item" id="item-bear" title="Teddy Bear (+Sleep)">🧸</div>
                <div class="inventory-item" id="item-rattle" title="Rattle (+Happiness)">🪇</div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
